name: Lint

on:
  push:
    branches: [ "master" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.1

    - name: Sync dependencies
      run: uv sync --group dev --extra jwt --extra starlette

    - name: Ruff check
      run: uv run ruff check fastapi_cachex

    - name: Ruff format check
      run: uv run ruff format --check fastapi_cachex

    - name: Mypy strict
      run: uv run mypy fastapi_cachex --strict
